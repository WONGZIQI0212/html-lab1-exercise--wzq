<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Contact - Personal Portfolio">
    <title>Contact | Wong Zi Qi</title>
</head>

<body>

<!--Apply the inline style attribute to at least 5 different elements to demonstrate: color, background-color, font-size, border, and padding-->

<header>
    <h1>Contact Me</h1>
</header>

<main>

<section id="contact">
<h2>Feel free to contact me :)</h2>

<!--
-Use <form action="#" method="post"> with proper <fieldset> and <legend> grouping
-Include these input types: text, email, tel, number, date, range, and textarea
-->
    <form action="#" method="post">

        <fieldset>
            <legend>Personal Information</legend>

<!--Every input must have a linked <label for="..."> — no placeholder-only labelling-->
<!--Use required, min, max, placeholder, and maxlength attributes appropriately-->

            <label for="name">Full Name:</label><br>
            <input 
                type="text"
                id="name" 
                name="name"  
                placeholder="Enter your name" 
                required 
                maxlength="50"><br><br>

            <label for="email">Email:</label><br>
            <input 
                type="email" 
                id="email" 
                name="email" 
                placeholder="Enter your email" 
                required 
                maxlength="100"><br><br>

            <label for="phone">Phone:</label><br>
            <input 
                type="tel"
                id="phone" 
                name="phone"
                placeholder="012-3456789" 
                required><br><br>

            <label for="age">Age:</label><br>
            <input 
                type="number" 
                id="age" 
                name="age"
                min="12" 
                max="100"><br><br>

            <label for="date">Date:</label><br>
            <input 
                type="date" 
                id="date" 
                name="date"><br><br>
            
        </fieldset>
<br>
        <fieldset>
            <legend>Message Details</legend>

            <label for="subject">Subject:</label><br>

<!--Use <select> with <optgroup> and <option> elements for a 'Subject' dropdown-->
                <select 
                    id="subject" 
                    name="subject">
                        <optgroup label="General">
                            <option value="inquiry">Inquiry</option>
                            <option value="feedback">Feedback</option>
                        </optgroup>
                        <optgroup label="Business">
                            <option value="offer">Internship Offer</option>
                            <option value="job">Job Opportunity</option>
                            <option value="project">Project Collaboration</option>
                        </optgroup>
                </select><br><br>

<!--Add at least 3 checkboxes and 3 radio buttons with correct matching name attribute grouping-->
            <label>Topics of Interest:</label><br>

                <input type="checkbox" id="topic-frontend" name="topic" value="frontend">
                <label for="topic-frontend">Frontend Development</label><br>

                <input type="checkbox" id="topic-ux" name="topic" value="ux">
                <label for="topic-ux">UX Research</label><br>

                <input type="checkbox" id="topic-cpp" name="topic" value="python">
                <label for="topic-cpp">C++ Programming</label><br>

                <input type="checkbox" id="topic-ai" name="topic" value="ai">
                <label for="topic-ai">Artificial Intelligence</label><br><br>

            <label>Preferred Contact Method:</label><br>

                <input type="radio" id="contact-email" name="contact" value="email">
                <label for="contact-email">Email</label><br>

                <input type="radio" id="contact-phone" name="contact" value="phone">
                <label for="contact-phone">Phone</label><br>

                <input type="radio" id="contact-whatsapp" name="contact" value="whatsapp">
                <label for="contact-whatsapp">WhatsApp</label><br>

                <input type="radio" id="contact-telegram" name="contact" value="telegram">
                <label for="contact-telegram">Telegram</label><br><br>

            <label for="range">Urgent Level:</label><br>
                <input type="range" id="range" name="range" min="1" max="5"><br><br>

            <label for="message">Message:</label><br>
                <textarea 
                id="message" 
                name="message"
                maxlength="200"
                placeholder="Write your message here..."></textarea><br><br>
          
        </fieldset>
<br>
        <button 
            type="submit">Submit
        </button>

    </form>

</section>

</main>

<br>

<a href="index.html">Back to Home</a>

<footer>
    <p><small>© 2026 Wong Zi Qi. All rights reserved.</small></p>
</footer>

</body>
</html>
