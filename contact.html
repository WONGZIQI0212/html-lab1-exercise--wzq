<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Contact - Personal Portfolio">
    <title>Contact | Wong Zi Qi</title>
</head>

<body>

<header>
    <h1>Contact Me</h1>
</header>

<main>

<section id="contact">
    <form action="#" method="post">

        <fieldset style="border:2px solid black; padding:10px;">
            <legend style="font-size:18px;">Personal Information</legend>

            <label for="name">Full Name:</label><br>
            <label for="email">Email:</label><br>
            <label for="phone">Phone:</label><br>
            <label for="age">Age:</label><br>
            <label for="date">Date:</label><br>
            
        </fieldset>

<br>

        <fieldset style="border:2px solid green; padding:10px;">
            <legend>Message Details</legend>

            <label for="subject">Subject:</label><br>
            <label>Purpose Of Contact:</label><br>
            <label>Preferred Contact Method:</label><br>
            <label for="range">Urgent Level:</label><br>
            <label for="message">Message:</label><br>
          
        </fieldset>
<br>
        <button type="submit" style="background-color:blue; color:white; padding:10px;">
            Submit
        </button>

    </form>

</section>

</main>

<footer>
    <p><small>© 2026 Wong Zi Qi.</small></p>
</footer>

</body>
</html>
